<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time to study!</title>

    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    
    <!-- Header Section -->
    <header>
      <h1>Time to study!</h1>
      <h2> Let's study for 1 hour together, are you ready?</h2>
    </header>


    <!-- Main Content Section -->
    <main class="container">
      
      <!-- Media Player Section -->
      <div class="media-player">
        <video id="custom-video-player" controls>
          <source
            src="https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/miac.mp4"
            type="video/mp4"
          />
        </video>
      
   <nav class="study-progress">
  <h2>Your study progress</h2>

  <div class="timer-display" id="timer">60:00</div>

  <!-- VIDEO PROGRESS BAR INSIDE NAV -->

  <div class="video-progress">
    <div class="progress-bar">
      <span id="progress-bar-fill"></span>
    </div>
  </div>

      <div class="custom-controls">
          <button id="play-pause-btn" onclick="togglePlayPause()">
            <img
              id="play-pause-img"
              src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
              alt="Play Button"
              width="24"
              height="24"
            />
          </button>

        <div class="custom-controls">
          <button id="fast-forward-btn" onclick ="fastForward()">
            <img
            id="fast-forward-btn"
            src="buttons/icons8-fast-forward-30.png"
            alt="Fast forward button"
            />
          </button>
        </div> 
</main>

  <div class="timer-controls">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
  </div>
</nav>

    <!-- Footer Section -->
    <footer>
      <p>&copy; 2024 Media Player Website. All rights reserved.</p>
      <a href="https://icons8.com/icon/59862/play">Play</a> icon by
      <a href="https://icons8.com">Icons8</a>
      <a href="https://icons8.com/icon/61012/pause">Pause</a> icon by
      <a href="https://icons8.com">Icons8</a>
    </footer>
  </body>
</html>
